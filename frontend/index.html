<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anonymous – Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="auth">

 
  <div class="bg-animation">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">

      
      <div class="brand">
        <div class="brand-icon">🎭</div>
        <h1>Anonymous</h1>
        <p>Share problems. Get solutions. Stay anonymous.</p>
      </div>

      
      <div class="auth-tabs">
        <button class="tab active" id="loginTab">Login</button>
        <button class="tab" id="signupTab">Sign Up</button>
      </div>

      
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="loginEmail" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="loginPassword" placeholder="Enter your password" required />
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Login →</button>
      </form>

      
      <form id="signupForm" class="hidden">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="signupEmail" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="signupPassword" placeholder="Min 6 characters" required />
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="signupConfirm" placeholder="Re-enter password" required />
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Create Account →</button>
      </form>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
